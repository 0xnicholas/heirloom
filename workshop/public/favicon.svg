<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="heirloom" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7e14ff"/>
      <stop offset="100%" stop-color="#47bfff"/>
    </linearGradient>
  </defs>
  <!-- Hexagonal gem — heirloom = treasured, faceted, passed down -->
  <polygon points="16,2 28,9 28,23 16,30 4,23 4,9" fill="url(#heirloom)"/>
  <!-- Vertical facet -->
  <line x1="16" y1="2" x2="16" y2="30" stroke="#ffffff" stroke-width="0.5" opacity="0.35"/>
  <!-- Horizontal facet bands -->
  <line x1="4" y1="9" x2="28" y2="9" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
  <line x1="4" y1="23" x2="28" y2="23" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
  <!-- Inner highlight -->
  <polygon points="16,8 22,12 22,20 16,24 10,20 10,12" fill="#ffffff" opacity="0.15"/>
</svg>