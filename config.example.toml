[server]
host = "0.0.0.0"
port = 8080
log_level = "info"
allowed_origins = ["*"]
max_body_size = 10485760  # 10MB

[providers.openai]
enabled = true
base_url = "https://api.openai.com"
keys = [
    { value = "sk-your-key-here", weight = 1.0 }
]
max_retries = 3
retry_backoff_initial_ms = 500
retry_backoff_max_ms = 5000
request_timeout_seconds = 30
queue_concurrency = 100
queue_buffer_size = 1000

[providers.openai.network]
extra_headers = {}
enforce_http2 = false
proxy_url = ""
insecure_skip_verify = false

[providers.anthropic]
enabled = true
base_url = "https://api.anthropic.com"
keys = [
    { value = "sk-ant-your-key-here", weight = 1.0 }
]
max_retries = 3
retry_backoff_initial_ms = 500
retry_backoff_max_ms = 5000
request_timeout_seconds = 30
queue_concurrency = 100
queue_buffer_size = 1000

[providers.anthropic.network]
extra_headers = {}
enforce_http2 = false
proxy_url = ""
insecure_skip_verify = false

[providers.groq]
enabled = true
base_url = "https://api.groq.com/openai/v1"
keys = [
    { value = "gsk-your-key-here", weight = 1.0 }
]
max_retries = 3
retry_backoff_initial_ms = 500
retry_backoff_max_ms = 5000
request_timeout_seconds = 30
queue_concurrency = 100
queue_buffer_size = 1000

[providers.groq.network]
extra_headers = {}
enforce_http2 = false
proxy_url = ""
insecure_skip_verify = false

# Model-to-provider mapping (optional)
# If not specified, model name is used as provider name
[models]
gpt-4 = "openai"
gpt-3.5-turbo = "openai"
claude-3-opus = "anthropic"
claude-3-sonnet = "anthropic"
llama3-70b = "groq"

# Fallback chains
[[fallbacks]]
primary = "openai"
fallbacks = ["anthropic", "groq"]

[[fallbacks]]
primary = "anthropic"
fallbacks = ["openai"]

# MCP (Model Context Protocol) configuration
[mcp]
enabled = false
max_agent_depth = 5
tool_execution_timeout_seconds = 30

[[mcp.clients]]
name = "filesystem"
transport = "stdio"
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem", "/tmp"]
auto_execute = true
concurrency = 1

[[mcp.clients]]
name = "fetch"
transport = "sse"
url = "http://localhost:3001/sse"
auto_execute = false
concurrency = 10
timeout_seconds = 30