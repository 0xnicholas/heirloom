spring:
  application:
    name: heirloom

  datasource:
    url: jdbc:postgresql://localhost:5432/heirloom
    username: heirloom
    password: heirloom

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /docs

logging:
  level:
    com.heirloom: DEBUG
